<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios Monitoreo - FlueGuard Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../assets/js/auth.js"></script>
    <script>
        Auth.checkAuth(true); // Requiere admin
    </script>
</head>
<body>

    <!-- Notification Toast -->
    <div id="toast" class="toast"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="main-sidebar" style="display: none;">
        <div class="sidebar-header">
            <span class="nav-brand">FlueGuard Portal</span>
        </div>
        <nav class="sidebar-nav">
            <a href="/portal/devices" class="sidebar-item" id="nav-item-devices">
                <span class="sidebar-icon">📱</span> Dispositivos
            </a>
            <a href="/portal/user" class="sidebar-item admin-only" id="nav-item-user">
                <span class="sidebar-icon">👥</span> Usuarios FlueGuard
            </a>
            <a href="/portal/admin" class="sidebar-item admin-only" id="nav-item-admin">
                <span class="sidebar-icon">🛡️</span> Usuarios Monitoreo
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-info-side">
                <div id="side-user-name">...</div>
                <div id="side-user-role" class="role-badge">...</div>
            </div>
            <button id="logout-btn-side" class="logout-btn-side">🚪 Salir</button>
        </div>
    </aside>

    <div class="main-wrapper" style="display: none;">
        <!-- Top Navbar -->
        <header class="dashboard-nav" id="top-nav" style="display: none;">
            <div class="section-title">
                <h2 id="view-title">Usuarios Monitoreo</h2>
            </div>
            <div class="nav-actions">
                <!-- Notifications -->
                <div class="notifications-container" id="notifications-container" style="display: none;">
                    <button class="notifications-btn" id="notifications-btn">
                        🔔
                        <span class="notifications-badge" id="notifications-badge" style="display: none;">0</span>
                    </button>
                    <div class="notifications-dropdown" id="notifications-dropdown" style="display: none;">
                        <div class="notifications-header">Notificaciones</div>
                        <div class="notifications-list" id="notifications-list">
                            <!-- Items dinámicos -->
                        </div>
                        <button class="clear-notifications-btn" id="clear-notifications-btn">Limpiar todas</button>
                    </div>
                </div>

                <!-- User Menu -->
                <div class="user-menu-container">
                    <button class="user-menu-btn" id="user-menu-btn">
                        <span id="nav-user-name">Usuario</span>
                        <span class="dropdown-icon">▼</span>
                    </button>
                    <div class="user-dropdown" id="user-dropdown" style="display: none;">
                        <button class="dropdown-item" id="profile-menu-btn">👤 Mi Perfil</button>
                        <button class="dropdown-item text-danger" id="logout-btn">🚪 Cerrar Sesión</button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="dashboard-content">
            
            <div class="back-link-container">
                <a href="/portal" class="back-btn">← Volver</a>
            </div>

            <div class="content-header">
                <div class="search-box">
                    <input type="text" id="mon-user-search" placeholder="Buscar por email, nombre...">
                </div>
                <button class="btn primary-btn" id="add-mon-user-btn">+ Nuevo Monitor</button>
            </div>
            
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Email</th>
                            <th>Rol</th>
                            <th>Último Acceso</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="mon-users-table-body">
                        <!-- Filas dinámicas -->
                    </tbody>
                </table>
            </div>
            
        </main>
    </div>

    <!-- User Management Modal -->
    <div id="user-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="user-modal-title">Nuevo Monitor</h3>
                <button class="close-btn" id="close-user-modal">×</button>
            </div>
            <form id="user-form">
                <input type="hidden" id="u-id">
                
                <div class="form-row">
                    <div class="input-group">
                        <label for="u-first-name">Nombre</label>
                        <input type="text" id="u-first-name" required>
                    </div>
                    <div class="input-group">
                        <label for="u-last-name">Apellido</label>
                        <input type="text" id="u-last-name" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="u-email">Email</label>
                    <input type="email" id="u-email" required>
                </div>

                <div class="input-group" id="u-password-group">
                    <label for="u-password">Contraseña</label>
                    <input type="password" id="u-password" placeholder="Mínimo 6 caracteres">
                    <span class="input-hint" id="u-pw-hint">Obligatorio para nuevos monitores. Deje en blanco para no cambiar.</span>
                </div>

                <div class="form-row">
                    <div class="input-group">
                        <label for="u-role">Rol</label>
                        <select id="u-role">
                            <option value="monitor">Monitor</option>
                            <option value="admin">Administrador</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="u-active">Estado</label>
                        <select id="u-active">
                            <option value="1">Activo</option>
                            <option value="0">Inactivo</option>
                        </select>
                    </div>
                </div>

                <div class="settings-group">
                    <h4>Permisos Granulares</h4>
                    <div class="permissions-grid">
                        <label class="checkbox-label">
                            <input type="checkbox" id="p-view-dash" checked disabled> Ver Dashboard
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="p-view-dev" checked> Ver Dispositivos
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="p-change-set"> Cambiar Ajustes
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="p-manage-dev"> Gestionar FW/OTA
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="p-view-telemetry"> Ver Telemetría
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="p-view-alerts"> Ver Alertas
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="p-manage-users"> Gestionar Usuarios
                        </label>
                    </div>
                </div>

                <div class="modal-actions">
                    <button type="submit" id="save-user-btn" class="btn primary-btn">
                        <span class="btn-text">Guardar</span>
                        <span class="loader" style="display:none;"></span>
                    </button>
                    <button type="button" id="cancel-user-btn" class="btn outline-btn">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/layout.js"></script>
    <script src="admin.js"></script>
</body>
</html>
