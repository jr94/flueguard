<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlueGuard Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=2">
</head>
<body>

    <!-- Notification Toast -->
    <div id="toast" class="toast"></div>

    <!-- Login View -->
    <div id="login-view" class="view active">
        <div class="login-container">
            <div class="login-header">
                <h2>FlueGuard</h2>
                <p>Bienvenido al portal online</p>
            </div>
            <form id="login-form">
                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" required placeholder="correo@ejemplo.com">
                </div>
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" id="login-btn" class="btn primary-btn">
                    <span class="btn-text">Iniciar Sesión</span>
                    <span class="loader" style="display: none;"></span>
                </button>
            </form>
            <div class="back-home">
                <a href="/">← Volver al inicio</a>
            </div>
        </div>
    </div>

    <!-- Dashboard View -->
    <div id="dashboard-view" class="view">
        <nav class="dashboard-nav">
            <div class="nav-brand">FlueGuard Portal</div>
            <div class="nav-actions">
                <div class="user-menu-container">
                    <button id="user-menu-btn" class="user-menu-btn">
                        <span id="user-greeting" class="user-greeting"></span>
                        <span class="dropdown-icon">▼</span>
                    </button>
                    <div id="user-dropdown" class="user-dropdown" style="display: none;">
                        <button id="profile-btn" class="dropdown-item">👤 Mi Perfil</button>
                        <button id="logout-btn" class="dropdown-item text-danger">🚪 Cerrar Sesión</button>
                    </div>
                </div>
            </div>
        </nav>
        
        <main class="dashboard-content">
            <div class="section-header">
                <h2>Mis Dispositivos</h2>
                <button id="refresh-btn" class="btn icon-btn" title="Actualizar">
                    ↻
                </button>
            </div>
            
            <div id="devices-loader" class="page-loader">
                <div class="spinner"></div>
                <p>Cargando dispositivos...</p>
            </div>

            <div id="devices-grid" class="devices-grid" style="display: none;">
                <!-- Devices will be injected here via JS -->
            </div>
            
            <div id="no-devices" class="empty-state" style="display: none;">
                <div class="empty-icon">📱</div>
                <h3>Sin dispositivos</h3>
                <p>Aún no tiene dispositivos vinculados a su cuenta.</p>
            </div>
        </main>
    </div>

    <!-- Profile View -->
    <div id="profile-view" class="view">
        <nav class="dashboard-nav">
            <div class="nav-brand">FlueGuard Portal</div>
            <div class="nav-actions">
                <button id="back-dashboard-btn" class="btn outline-btn">← Volver</button>
            </div>
        </nav>

        <main class="dashboard-content">
            <div class="profile-container">
                <div class="section-header">
                    <h2>Mi Perfil</h2>
                </div>
                
                <form id="profile-form" class="profile-form">
                    <div class="form-row">
                        <div class="input-group">
                            <label for="profile-nombre">Nombre</label>
                            <input type="text" id="profile-nombre" required>
                        </div>
                        <div class="input-group">
                            <label for="profile-apellido">Apellido</label>
                            <input type="text" id="profile-apellido" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="input-group">
                            <label for="profile-region">Región</label>
                            <select id="profile-region">
                                <option value="">Seleccione una región</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="profile-comuna">Comuna</label>
                            <select id="profile-comuna" disabled>
                                <option value="">Seleccione una comuna</option>
                            </select>
                        </div>
                    </div>

                    <hr class="divider">

                    <h3>Cambiar Contraseña</h3>
                    <p class="text-secondary" style="font-size: 0.9rem; margin-bottom: 1rem;">Deje en blanco si no desea cambiarla.</p>

                    <div class="form-row">
                        <div class="input-group">
                            <label for="profile-password">Nueva Contraseña</label>
                            <input type="password" id="profile-password" minlength="6">
                        </div>
                        <div class="input-group">
                            <label for="profile-confirm-password">Confirmar Contraseña</label>
                            <input type="password" id="profile-confirm-password">
                        </div>
                    </div>

                    <button type="submit" id="save-profile-btn" class="btn primary-btn" style="max-width: 200px; margin-top: 1rem;">
                        <span class="btn-text">Guardar Cambios</span>
                        <span class="loader" style="display: none;"></span>
                    </button>
                </form>
            </div>
        </main>
    </div>

    <script src="app.js?v=2"></script>
</body>
</html>
