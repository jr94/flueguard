<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlueGuard Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Notification Toast -->
    <div id="toast" class="toast"></div>

    <!-- Login View -->
    <div id="login-view" class="view active">
        <div class="login-container">
            <div class="login-header">
                <h2>FlueGuard</h2>
                <p>Bienvenido al portal online</p>
            </div>
            <form id="login-form">
                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" required placeholder="correo@ejemplo.com">
                </div>
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" id="login-btn" class="btn primary-btn">
                    <span class="btn-text">Iniciar Sesión</span>
                    <span class="loader" style="display: none;"></span>
                </button>
            </form>
            <div class="back-home">
                <a href="/">← Volver al inicio</a>
            </div>
        </div>
    </div>

    <!-- Dashboard View -->
    <div id="dashboard-view" class="view">
        <nav class="dashboard-nav">
            <div class="nav-brand">FlueGuard Portal</div>
            <div class="nav-actions">
                <span id="user-greeting" class="user-greeting"></span>
                <button id="logout-btn" class="btn outline-btn">Cerrar Sesión</button>
            </div>
        </nav>
        
        <main class="dashboard-content">
            <div class="section-header">
                <h2>Mis Dispositivos</h2>
                <button id="refresh-btn" class="btn icon-btn" title="Actualizar">
                    ↻
                </button>
            </div>
            
            <div id="devices-loader" class="page-loader">
                <div class="spinner"></div>
                <p>Cargando dispositivos...</p>
            </div>

            <div id="devices-grid" class="devices-grid" style="display: none;">
                <!-- Devices will be injected here via JS -->
            </div>
            
            <div id="no-devices" class="empty-state" style="display: none;">
                <div class="empty-icon">📱</div>
                <h3>Sin dispositivos</h3>
                <p>Aún no tiene dispositivos vinculados a su cuenta.</p>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
