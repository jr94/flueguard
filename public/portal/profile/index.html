<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - FlueGuard Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="../assets/js/auth.js"></script>
    <script>
        Auth.checkAuth();
    </script>
</head>
<body>

    <!-- Notification Toast -->
    <div id="toast" class="toast"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="main-sidebar" style="display: none;">
        <div class="sidebar-header">
            <span class="nav-brand">FlueGuard Portal</span>
        </div>
        <nav class="sidebar-nav">
            <a href="/portal" class="sidebar-item" id="nav-item-home">
                <span class="sidebar-icon">📊</span> Principal
            </a>
            <a href="/portal/devices" class="sidebar-item" id="nav-item-devices">
                <span class="sidebar-icon">📱</span> Dispositivos
            </a>
            <a href="/portal/user" class="sidebar-item admin-only" id="nav-item-user">
                <span class="sidebar-icon">👥</span> Usuarios FlueGuard
            </a>
            <a href="/portal/admin" class="sidebar-item admin-only" id="nav-item-admin">
                <span class="sidebar-icon">🛡️</span> Usuarios Monitoreo
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-info-side">
                <div id="side-user-name">...</div>
                <div id="side-user-role" class="role-badge">...</div>
            </div>
            <button id="logout-btn-side" class="logout-btn-side">🚪 Salir</button>
        </div>
    </aside>

    <div class="main-wrapper">
        <!-- Top Navbar -->
        <header class="dashboard-nav" id="top-nav" style="display: none;">
            <div class="section-title">
                <h2 id="view-title">Mi Perfil</h2>
            </div>
            <div class="nav-actions">
                <!-- Notifications -->
                <div class="notifications-container" id="notifications-container" style="display: none;">
                    <button class="notifications-btn" id="notifications-btn">
                        🔔
                        <span class="notifications-badge" id="notifications-badge" style="display: none;">0</span>
                    </button>
                    <div class="notifications-dropdown" id="notifications-dropdown" style="display: none;">
                        <div class="notifications-header">Notificaciones</div>
                        <div class="notifications-list" id="notifications-list">
                            <!-- Items dinámicos -->
                        </div>
                        <button class="clear-notifications-btn" id="clear-notifications-btn">Limpiar todas</button>
                    </div>
                </div>

                <!-- User Menu -->
                <div class="user-menu-container">
                    <button class="user-menu-btn" id="user-menu-btn">
                        <span id="nav-user-name">Usuario</span>
                        <span class="dropdown-icon">▼</span>
                    </button>
                    <div class="user-dropdown" id="user-dropdown" style="display: none;">
                        <button class="dropdown-item" id="profile-menu-btn">👤 Mi Perfil</button>
                        <button class="dropdown-item text-danger" id="logout-btn">🚪 Cerrar Sesión</button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="dashboard-content">
            
            <div class="back-link-container">
                <a href="/portal" class="back-btn">← Volver</a>
            </div>

            <div class="profile-container">
                <form id="profile-form" class="profile-form">
                    <div class="form-row">
                        <div class="input-group">
                            <label for="profile-nombre">Nombre</label>
                            <input type="text" id="profile-nombre" required>
                        </div>
                        <div class="input-group">
                            <label for="profile-apellido">Apellido</label>
                            <input type="text" id="profile-apellido">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="input-group">
                            <label>Correo Electrónico</label>
                            <input type="email" id="profile-email" disabled style="opacity:0.6;">
                        </div>
                        <div class="input-group">
                            <label>Rol</label>
                            <input type="text" id="profile-role" disabled style="opacity:0.6; text-transform: capitalize;">
                        </div>
                    </div>

                    <hr class="divider">

                    <h3>Cambiar Contraseña</h3>
                    <p class="text-secondary" style="font-size: 0.9rem; margin-bottom: 1rem;">Deje en blanco si no desea cambiarla.</p>

                    <div class="form-row">
                        <div class="input-group">
                            <label for="profile-password">Nueva Contraseña</label>
                            <input type="password" id="profile-password" minlength="6">
                        </div>
                        <div class="input-group">
                            <label for="profile-confirm-password">Confirmar Contraseña</label>
                            <input type="password" id="profile-confirm-password">
                        </div>
                    </div>

                    <button type="submit" id="save-profile-btn" class="btn primary-btn" style="max-width: 200px; margin-top: 1rem;">
                        <span class="btn-text">Guardar Cambios</span>
                        <span class="loader" style="display: none;"></span>
                    </button>
                </form>
            </div>
            
        </main>
    </div>

    <!-- Scripts -->
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/layout.js"></script>
    <script src="profile.js"></script>
</body>
</html>
